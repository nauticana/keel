# Geographic reference seed data — countries, states, counties
#
# Scope:
#   - country:  N+S America, Turkey, Europe (ISO 3166-1 alpha-2)
#   - state:    US (50 + DC) and Canada (13 provinces/territories) only
#   - county:   US only (FIPS-derived). Canadian tax is province-level;
#               subdivisions in other countries are intentionally not seeded.
#
# Design note — tax jurisdiction does NOT live in keel:
#   keel ships reference geography. Apps that need tax define their own
#   `tax_jurisdiction` table that FKs back to country/state. Do not add rates or jurisdictions here.
#
# Cities are not a first-class table in keel. Consumers store city as
# a free-form column on their address/location tables.
comment: Geographic reference seed data — countries, states, and counties
order: 3
