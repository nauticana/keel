comment: Security seed data — roles, permissions, FK lookups, REST APIs, and account policies
order: 2
seeds:
  - table: foreign_key_lookup
    columns: [constraint_name, lookup_style, display_column]
    rows:
      - [authorization_role_permissions, D, caption]
      - [permitted_object_action, S, "*"]
      - [user_permissions, S, "*"]
      - [permitted_users, D, caption]
      - [user_historic_actions, S, "*"]
      - [partner_users, S, "*"]
      - [user_partners, S, "*"]
      - [partner_addresses, S, "*"]
      - [partner_address_countries, D, caption]
      - [partner_address_states, D, caption]
      - [partner_domains, S, "*"]
      - [user_refresh_tokens, S, "*"]
      - [user_trusted_devices, S, "*"]
      - [api_key_partners, S, "*"]

  - table: rest_api_header
    columns: [id, master_table]
    rows:
      - [authorization_role, authorization_role]
      - [user_account, user_account]
      - [user_account_policy, user_account_policy]
      - [business_partner, business_partner]
      - [partner_domain, partner_domain]
      - [partner_registration, business_partner]
      - [partner_quota_usage, business_partner]
      - [api_key, api_key]

  - table: rest_api_child
    columns: [api_id, seq, parent_seq, constraint_name]
    rows:
      - [authorization_role, 1, 0, authorization_role_permissions]
      - [user_account, 1, 0, user_permissions]
      - [user_account, 2, 0, user_historic_actions]
      - [business_partner, 1, 0, partner_users]
      - [business_partner, 2, 0, partner_addresses]
      - [business_partner, 3, 0, partner_domains]
      - [partner_registration, 1, 0, partner_users]
      - [partner_registration, 2, 0, partner_addresses]
      - [partner_registration, 3, 0, partner_domains]
      - [partner_registration, 4, 0, partner_plan_subscriptions]
      - [partner_registration, 5, 0, partner_addon_subscriptions]
      - [partner_quota_usage, 1, 0, partner_usage_ledger]

  - table: application_menu
    columns: [display_order, id, caption]
    rows:
      - [20, security, "Security"]

  - table: application_menu_item
    columns: [display_order, filter_on_list, menu_id, item_id, rest_uri, caption]
    rows:
      - [10, false, security, authorization_roles, authorization_role, "Authorization Roles"]
      - [20, false, security, user_accounts, user_account, "User Accounts"]
      - [30, false, security, user_account_policies, user_account_policy, "Account Policies"]
      - [40, false, security, business_partners, business_partner, "Business Partners"]
      - [50, true, security, partner_domains, partner_domain, "Partner Domains"]
      - [60, false, security, api_keys, api_key, "API Keys"]

  - table: authorization_role
    columns: [id, caption]
    rows:
      - [SUPER, "Super Administrator"]
      - [APP_ADMIN, "Application Administrator"]
      - [SECURITY_ADMIN, "Security Administrator"]
      - [SECURITY_OPER, "Security Operator"]
      - [BUSINESS_ADMIN, "Business Administrator"]
      - [PARTNER_ADMIN, "Partner Administrator"]

