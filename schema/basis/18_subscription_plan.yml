table: subscription_plan
comment: Subscription plans with pricing
order: 40
columns:
  - name: id
    type: VARCHAR(20)
  - name: caption
    type: VARCHAR(80)
  - name: is_active
    type: BOOLEAN
    default: "TRUE"
  - name: monthly_cost
    type: NUMERIC(18,2)
  - name: annual_cost
    type: NUMERIC(18,2)
  - name: currency
    type: CHAR(3)
    default: USD
  - name: provider_price_id
    type: VARCHAR(64)
    nullable: true
  # activation_mode (SUBSCRIPTION_ACTIVATION_MODE dict): how a checkout activates
  # the sub. A=create-active, P=activate-pending, T=trial, F=free. Open dictionary
  # — one_time/invoice_terms/manual_approval slot in later as rows, no schema break.
  - name: activation_mode
    type: CHAR(1)
    default: A
  - name: trial_days
    type: INTEGER
    nullable: true
primary_key: [id]
