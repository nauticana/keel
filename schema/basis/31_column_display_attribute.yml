table: column_display_attribute
comment: Per-column UI display overrides (read-only, field width, textarea rows)
order: 31
columns:
  - name: table_name
    type: VARCHAR(63)
  - name: column_name
    type: VARCHAR(63)
  - name: read_only
    type: BOOLEAN
    default: "false"
  - name: display_width
    type: INTEGER
    nullable: true
  - name: display_rows
    type: INTEGER
    nullable: true
primary_key: [table_name, column_name]
