table: subscription_addon
comment: Optional add-on features with separate pricing
order: 43
columns:
  - name: id
    type: VARCHAR(20)
  - name: caption
    type: VARCHAR(80)
  - name: max_value
    type: BIGINT
  - name: is_active
    type: BOOLEAN
    default: "TRUE"
  - name: monthly_cost
    type: NUMERIC(18,2)
  - name: currency
    type: CHAR(3)
    default: USD
  - name: period_type
    type: CHAR(1)
    default: M
  - name: description
    type: VARCHAR(255)
    nullable: true
primary_key: [id]
