table: subscription_addon
comment: Optional add-on features with separate pricing
order: 43
columns:
  - name: id
    type: VARCHAR(20)
  - name: caption
    type: VARCHAR(80)
  - name: max_value
    type: BIGINT
  - name: is_active
    type: BOOLEAN
    default: "TRUE"
  # monthly_cost is the price for one term_type unit (display/NUMERIC; the charge
  # path uses minor units). Per-charge = this ÷ (term_type ÷ billing_cycle).
  - name: monthly_cost
    type: NUMERIC(18,2)
  - name: currency
    type: CHAR(3)
    default: USD
  # billing_cycle (PERIOD_TYPE): how often charged. term_count × term_type: the
  # commitment. Same three-axis model as subscription_plan_price.
  - name: billing_cycle
    type: CHAR(1)
    default: M
  - name: term_count
    type: INTEGER
    default: "1"
  - name: term_type
    type: CHAR(1)
    default: M
  - name: description
    type: VARCHAR(255)
    nullable: true
primary_key: [id]
