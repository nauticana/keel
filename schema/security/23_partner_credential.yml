table: partner_credential
comment: OAuth / API-key credentials for partner connections to external providers
order: 43
columns:
  - name: id
    type: BIGINT
  - name: partner_id
    type: BIGINT
  - name: entity_id
    type: BIGINT
    default: "0"
  - name: provider
    type: VARCHAR(30)
  - name: connection_type
    type: CHAR(1)
    default: "O"
  - name: cred_ref
    type: TEXT
  - name: api_endpoint
    type: VARCHAR(255)
    nullable: true
  - name: status
    type: CHAR(1)
    default: "A"
  - name: rev
    type: INTEGER
    default: "0"
  - name: lease_until
    type: TIMESTAMP
    nullable: true
  - name: issued_at
    type: TIMESTAMP
    nullable: true
  - name: last_checked
    type: TIMESTAMP
    nullable: true
  - name: created_at
    type: TIMESTAMP
    default: CURRENT_TIMESTAMP
primary_key: [id]
sequence:
  name: partner_credential_seq
  column: id
foreign_keys:
  - name: partner_credential_partners
    columns: [partner_id]
    references:
      table: business_partner
      columns: [id]
# One connection per (partner, entity, provider); connection_type is an attribute.
indexes:
  - name: partner_credential_uq
    columns: [partner_id, entity_id, provider]
    unique: true
