comment: Keel platform seed data
order: 1
seeds:
  - table: constant_header
    columns: [id, caption]
    rows:
      - [lookup_style, "Lookup Style"]
      - [payout_provider, "Payout Provider"]
      - [tax_id_type, "Tax ID Type"]
      - [payment_method_type, "Payment Method Type"]
      - [measurement_unit, "Measurement Unit"]

  - table: constant_value
    columns: [constant_id, value, caption]
    rows:
      - [lookup_style, D, "Dropdown"]
      - [lookup_style, S, "Search Screen"]
      - [payout_provider, AW, "Airwallex"]
      - [payout_provider, SC, "Stripe Connect"]
      - [payout_provider, WI, "Wise"]
      - [tax_id_type, S, "SIN (Canada)"]
      - [tax_id_type, N, "SSN or EIN (USA)"]
      - [tax_id_type, E, "EIN (USA business)"]
      - [tax_id_type, V, "VAT (EU)"]
      - [tax_id_type, O, "Other"]
      - [payment_method_type, card,       "Card"]
      - [payment_method_type, bank,       "Bank Account"]
      - [payment_method_type, wallet,     "Wallet"]
      - [payment_method_type, apple_pay,  "Apple Pay"]
      - [payment_method_type, google_pay, "Google Pay"]
      # Measurement / pricing units. Value is the API-returned token (AI-facing:
      # "per hour" reads better than "HR"); caption is the dropdown label.
      # time + service  (the units service pricing needs most)
      - [measurement_unit, each,     "Each"]
      - [measurement_unit, lump_sum, "Lump Sum"]
      - [measurement_unit, minute,   "Minute"]
      - [measurement_unit, hour,     "Hour"]
      - [measurement_unit, day,      "Day"]
      - [measurement_unit, week,     "Week"]
      - [measurement_unit, month,    "Month"]
      - [measurement_unit, year,     "Year"]
      - [measurement_unit, session,  "Session"]
      - [measurement_unit, visit,    "Visit"]
      - [measurement_unit, person,   "Person"]
      # retail packaging
      - [measurement_unit, dozen,    "Dozen"]
      - [measurement_unit, pair,     "Pair"]
      - [measurement_unit, set,      "Set"]
      - [measurement_unit, pack,     "Pack"]
      # weight
      - [measurement_unit, mg,       "Milligram"]
      - [measurement_unit, gram,     "Gram"]
      - [measurement_unit, kg,       "Kilogram"]
      - [measurement_unit, oz,       "Ounce"]
      - [measurement_unit, lb,       "Pound"]
      - [measurement_unit, ton,      "Ton"]
      # volume
      - [measurement_unit, ml,       "Milliliter"]
      - [measurement_unit, liter,    "Liter"]
      - [measurement_unit, gallon,   "Gallon"]
      # length
      - [measurement_unit, mm,       "Millimeter"]
      - [measurement_unit, cm,       "Centimeter"]
      - [measurement_unit, meter,    "Meter"]
      - [measurement_unit, km,       "Kilometer"]
      - [measurement_unit, inch,     "Inch"]
      - [measurement_unit, foot,     "Foot"]
      - [measurement_unit, yard,     "Yard"]
      - [measurement_unit, mile,     "Mile"]
      # area
      - [measurement_unit, sqft,     "Square Foot"]
      - [measurement_unit, sqm,      "Square Meter"]

  - table: constant_lookup
    columns: [constant_id, table_name, column_name]
    rows:
      - [lookup_style, foreign_key_lookup, lookup_style]
      - [payout_provider, user_bank_info, provider]
      - [tax_id_type, user_bank_info, tax_id_type]
      - [payment_method_type, user_payment_method, method_type]

  - table: foreign_key_lookup
    columns: [constraint_name, lookup_style, display_column]
    rows:
      - [application_menu_items, D, caption]
      - [rest_api_children, S, "*"]
      - [constant_lookups, D, caption]
      - [constant_values, D, caption]
      - [authorization_object_actions, S, "*"]
      - [rest_report_params, S, "*"]
      - [states, S, "*"]
      - [counties, S, "*"]
      - [partner_payment_methods, S, "*"]
      - [partner_payment_records, S, "*"]
      - [payment_record_plans, D, caption]

  - table: authorization_object
    columns: [id, caption]
    rows:
      - [PAGE, "Frontend Page"]
      - [TABLE, "Database Table"]
      - [REPORT, "Analytic Report"]

  - table: authorization_object_action
    columns: [authorization_object_id, action, caption]
    rows:
      - [PAGE, ACCESS, ACCESS]
      - [TABLE, SELECT, SELECT]
      - [TABLE, INSERT, INSERT]
      - [TABLE, UPDATE, UPDATE]
      - [TABLE, DELETE, DELETE]
      - [REPORT, ACCESS, ACCESS]

  - table: rest_api_header
    columns: [id, master_table]
    rows:
      - [foreign_key_lookup, foreign_key_lookup]
      - [application_menu, application_menu]
      - [constant_header, constant_header]
      - [table_sequence_usage, table_sequence_usage]
      - [service_registry, service_registry]
      - [rest_api_header, rest_api_header]
      - [rest_report_header, rest_report_header]
      - [authorization_object, authorization_object]
      - [country, country]
      - [payment_webhook_log, payment_webhook_log]
      - [payment_record, payment_record]
      - [payment_method, payment_method]
      - [user_bank_info, user_bank_info]
      - [user_payment_method, user_payment_method]
      - [table_action, table_action]

  - table: rest_api_child
    columns: [api_id, seq, parent_seq, constraint_name]
    rows:
      - [application_menu, 1, 0, application_menu_items]
      - [constant_header, 1, 0, constant_values]
      - [constant_header, 2, 0, constant_lookups]
      - [rest_api_header, 1, 0, rest_api_children]
      - [rest_report_header, 1, 0, rest_report_params]
      - [authorization_object, 1, 0, authorization_object_actions]
      - [country, 1, 0, states]
      - [country, 2, 1, counties]

  - table: authorization_object
    columns: [id, caption]
    rows:
      - [USER_PAYMENT_METHOD, "User Payment Method Actions"]

  - table: authorization_object_action
    columns: [authorization_object_id, action, caption]
    rows:
      - [USER_PAYMENT_METHOD, SET_DEFAULT, "Set Default"]

  - table: table_action
    columns: [table_name, action_name, caption, icon, record_specific, display_order]
    rows:
      - [user_payment_method, set_default, "Set Default", star, true, 10]

  - table: application_menu
    columns: [display_order, id, caption]
    rows:
      - [99, setup, "Setup"]
      - [90, payments, "Payments"]
      - [95, payouts, "Payouts"]

  - table: application_menu_item
    columns: [display_order, filter_on_list, menu_id, item_id, rest_uri, caption]
    rows:
      - [10,  false, setup, constant_headers, constant_header, "Constant Headers"]
      - [20,  false, setup, foreign_key_lookups, foreign_key_lookup, "Foreign Key Lookups"]
      - [30,  false, setup, table_sequence_usages, table_sequence_usage, "Table Sequence Usages"]
      - [40,  false, setup, application_menus, application_menu, "Application Menus"]
      - [50,  false, setup, rest_api_headers, rest_api_header, "Rest Api Headers"]
      - [60,  false, setup, rest_report_headers, rest_report_header, "Rest Report Headers"]
      - [70,  false, setup, authorization_objects, authorization_object, "Authorization Objects"]
      - [75,  true,  setup, business_partners, business_partner, "Business Partners"]
      - [80,  false, setup, partner_domains, partner_domain, "Domains"]
      - [90,  false, setup, api_keys, api_key, "API Keys"]
      - [100, false, setup, countries, country, "Countries"]
      - [110, false, setup, service_registries, service_registry, "Service Registries"]
      - [120, false, setup, table_actions, table_action, "Table Actions"]
      - [10,  false, payments, payment_records, payment_record, "Payment Records"]
      - [20,  false, payments, payment_methods, payment_method, "Payment Methods"]
      - [30,  false, payments, payment_webhook_logs, payment_webhook_log, "Webhook Logs"]
      - [40,  true,  payments, user_payment_methods, user_payment_method, "User Payment Methods"]
      - [10,  true,  payouts,  user_bank_infos, user_bank_info, "Bank Accounts"]

  # Audit-column display modes for keel's own framework tables. R = display-only
  # (system-set, excluded from writes); U = keel stamps now() on UPDATE. All
  # listed columns are NOT NULL DEFAULT CURRENT_TIMESTAMP, so excluding them from
  # INSERT is safe — the DB default fills them.
  - table: column_display_attribute
    columns: [table_name, column_name, display_mode]
    rows:
      - [user_registration,   created_at,         R]
      - [partner_user,        begda,              R]
      - [partner_domain,      created_at,         R]
      - [user_refresh_token,  created_at,         R]
      - [api_key,             created_at,         R]
      - [consent_event,       created_at,         R]
      - [device_token,        created_at,         R]
      - [device_token,        updated_at,         U]
      - [payment_method,      created_at,         R]
      - [payment_record,      created_at,         R]
      - [user_bank_info,      created_at,         R]
      - [user_bank_info,      updated_at,         U]
      - [user_payment_method, created_at,         R]
      - [user_account,        passtext,           S]
      - [user_account,        twofa_secret,       S]
      - [user_account,        twofa_backup_codes, S]
